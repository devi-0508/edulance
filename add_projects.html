<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduLance | Post Project</title>

    <!-- Shared CSS -->
    <link rel="stylesheet" href="style.css">

    <!-- Font -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
</head>

<body>

<!-- ========== NAVBAR ========== -->
<header>
    <nav class="navbar">
        <div class="logo">EduLance</div>

        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="projects.html">Projects</a></li>
            <li><a href="add_projects.html">Post Project</a></li>
            <li><a href="login.html">Login</a></li>
            <li><a href="register.html" class="register-btn">Register</a></li>
            <li>
                <button id="logoutBtn" class="logout-btn" onclick="logout()" style="display:none;">
                    Logout
                </button>
            </li>
        </ul>
    </nav>
</header>

<!-- ========== ADD PROJECT FORM ========== -->
<section>
    <h2>Post a New Project</h2>
    <p>Fill in the details below to post your project and connect with freelancers.</p>

    <form id="addProjectForm">
        <!-- Project Title -->
        <input
            type="text"
            id="projectTitle"
            placeholder="Project Title"
            required
        >

        <!-- Project Description -->
        <textarea
            id="projectDescription"
            placeholder="Project Description"
            required
        ></textarea>

        <!-- Required Skills -->
        <input
            type="text"
            id="projectSkills"
            placeholder="Required Skills (comma separated: HTML, CSS, JS)"
            required
        >

        <!-- Budget -->
        <input
            type="number"
            id="projectBudget"
            placeholder="Budget (₹)"
            required
        >

        <!-- Submit Button -->
        <button type="submit">Post Project</button>
    </form>

    <p id="projectMessage" style="margin-top:15px; text-align:center;"></p>
</section>

<!-- ========== FOOTER ========== -->
<footer class="footer">
    <p>© 2026 EduLance — IT Engineering Mini Project</p>
</footer>

</body>

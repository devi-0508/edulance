<body>

    <!-- ========== NAVBAR ========== -->
    <header>
        <nav class="navbar">

    <!-- ========== ADD PROJECT FORM ========== -->
    <section>
        <h2>Post a New Project</h2>

        <!-- IDs prepared for Firebase integration -->
        <form id="addProjectForm">

            <input
                type="text"
                id="projectTitle"
                placeholder="Project Title"
                required
            >

            <textarea
                id="projectDescription"
                placeholder="Project Description"
                required
            ></textarea>

            <input
                type="text"
                id="projectSkills"
                placeholder="Required Skills (comma separated: HTML, CSS, JS)"
                required
            >

            <input
                type="number"
                id="projectBudget"
                placeholder="Budget (₹)"
                required
            >

            <button type="submit">Post Project</button>

        </form>
    </section>


    <!-- ========== FOOTER ========== -->
    <footer class="footer">
        <p>© 2026 FreelanceHub — IT Engineering Mini Project</p>
    </footer>

    <!-- Firebase SDK (compat) -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>

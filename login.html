<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduLance | Login</title>

    <!-- Shared CSS -->
    <link rel="stylesheet" href="style.css">

    <!-- Font -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
</head>

<body>

<!-- ========== NAVBAR ========== -->
<header>
  <nav class="navbar">
    <div class="logo">EduLance</div>
    <ul class="nav-links">
      <li><a href="index.html">Home</a></li>
      <li><a href="projects.html">Projects</a></li>
      <li><a href="add_projects.html">Post Project</a></li>
      <li><a href="freelancers.html">Freelancers</a></li>
      <li><a href="login.html" id="loginLink">Login</a></li>
      <li><a href="register.html" id="registerLink" class="register-btn">Register</a></li>
      <li>
        <button id="logoutBtn" class="logout-btn" onclick="logout()" style="display:none;">
          Logout
        </button>
      </li>
    </ul>
  </nav>
</header>



<!-- ========== LOGIN SECTION ========== -->
<section class="login-section">
    <h2>Login to Your Account</h2>

    <form id="loginForm">
        <!-- Email -->
        <input 
            type="email"
            id="loginEmail"
            placeholder="Email Address"
            required
        >

        <!-- Password -->
        <input 
            type="password"
            id="loginPassword"
            placeholder="Password"
            required
        >

        <!-- Login Button -->
        <button type="submit">Login</button>

        <p style="margin-top:15px; text-align:center;">
            Don’t have an account?
            <a href="register.html">Register here</a>
        </p>

        <p style="text-align:center; font-size:14px; opacity:0.7;">
            Please verify your email before logging in.
        </p>
    </form>
</section>

<!-- ========== FOOTER ========== -->
<footer class="footer">
    <p>© 2026 EduLance — IT Engineering Mini Project</p>
</footer>

<!-- Firebase SDKs (compat versions for global firebase object) -->
<script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-firestore-compat.js"></script>

<!-- Your Firebase config -->
<script src="firebase-config.js"></script>

<!-- Your app logic -->
<script src="app.js"></script>



</body>
</html>

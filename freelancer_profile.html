<section>
    <h2>Freelancer Profile</h2>

    <p>Add your skills (comma separated)</p>

    <textarea
        id="freelancerSkills"
        placeholder="Example: HTML, CSS, JavaScript, UI Design"
        rows="5"
    ></textarea>

    <br><br>

    <button onclick="saveFreelancerProfile()">Save Profile</button>

    <p id="saveMessage"></p>
</section>

<section>
    <h2>Freelancer Profile</h2>

    <br><br>

    <button onclick="saveFreelancerProfile()">Save Profile</button>

    <p id="saveMessage"></p>
</section>


<!-- ✅ ADD SKILLS SECTION HERE (INSIDE BODY) -->
<section id="skillsSection" style="display:none; text-align:center; padding:40px;">

    <h2>Your Skills</h2>

    <div class="skills-list">
        <label><input type="checkbox" value="Java"> Java</label>
        <label><input type="checkbox" value="Python"> Python</label>
        <label><input type="checkbox" value="JavaScript"> JavaScript</label>
        <label><input type="checkbox" value="React"> React</label>
        <label><input type="checkbox" value="Firebase"> Firebase</label>
        <label><input type="checkbox" value="UI/UX"> UI/UX</label>
    </div>

    <br>
    <button onclick="saveSkills()">Save Skills</button>

</section>

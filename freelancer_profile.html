<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Freelancer Profile | EduLance</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

<header>
    <nav class="navbar">
        <div class="logo">EduLance</div>

        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="projects.html">Projects</a></li>
            <li>
                <button id="logoutBtn" onclick="logout()">Logout</button>
            </li>
        </ul>
    </nav>
</header>

<section id="skillsSection" style="display:none; text-align:center; padding:40px;">
    <h2>Your Skills</h2>

    <div class="skills-list">

        <input type="checkbox" id="java" value="Java">
        <label for="java">Java</label>

        <input type="checkbox" id="python" value="Python">
        <label for="python">Python</label>

        <input type="checkbox" id="js" value="JavaScript">
        <label for="js">JavaScript</label>

        <input type="checkbox" id="react" value="React">
        <label for="react">React</label>

        <input type="checkbox" id="firebase" value="Firebase">
        <label for="firebase">Firebase</label>

        <input type="checkbox" id="uiux" value="UI/UX">
        <label for="uiux">UI/UX</label>

    </div>

    <br>
    <button onclick="saveSkills()">Save Skills</button>
</section>

<footer class="footer">
    <p>© 2026 EduLance — IT Engineering Mini Project</p>
</footer>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<script src="firebase-config.js"></script>
<script src="app.js"></script>

</body>
</html>

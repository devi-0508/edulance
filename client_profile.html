<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Client Profile | EduLance</title>

    <!-- Shared CSS -->
    <link rel="stylesheet" href="style.css">

    <!-- Font -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
</head>

<body>

<!-- ========== NAVBAR ========== -->
<header>
  <nav class="navbar">
    <div class="logo">EduLance</div>
    <ul class="nav-links">
      <li><a href="index.html">Home</a></li>
      <li><a href="projects.html">Projects</a></li>
      <li><a href="add_projects.html">Post Project</a></li>
      <li><a href="freelancers.html">Freelancers</a></li>
      <li><a href="login.html" id="loginLink">Login</a></li>
      <li><a href="register.html" id="registerLink" class="register-btn">Register</a></li>
      <li>
        <button id="logoutBtn" class="logout-btn" onclick="logout()" style="display:none;">
          Logout
        </button>
      </li>
    </ul>
  </nav>
</header>



<!-- ========== CLIENT DASHBOARD ========== -->
<section class="profile-container">
    <h2>Client Dashboard</h2>
    <p>Post new projects and manage your existing ones.</p>

    <!-- Project Posting Form -->
    <form id="addProjectForm">
        <input
            type="text"
            id="projectTitle"
            placeholder="Project Title"
            required
        >

        <textarea
            id="projectDescription"
            placeholder="Project Description"
            required
        ></textarea>

        <input
            type="text"
            id="projectSkills"
            placeholder="Required Skills (comma separated: HTML, CSS, JS)"
            required
        >

        <input
            type="number"
            id="projectBudget"
            placeholder="Budget (₹)"
            required
        >

        <button type="submit">Post Project</button>
    </form>

    <p id="projectMessage" style="margin-top:15px; text-align:center;"></p>

    <!-- Client's Posted Projects -->
    <section style="margin-top:40px;">
        <h3>My Posted Projects</h3>
        <div class="card-container" id="clientProjectsContainer">
            <!-- JS will insert client’s projects here -->
        </div>
    </section>
</section>

<!-- ========== FOOTER ========== -->
<footer class="footer">
    <p>© 2026 EduLance — IT Engineering Mini Project</p>
</footer>

<!-- Firebase App (core SDK) -->
<script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app.js"></script>
<!-- Firebase Authentication -->
<script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-auth.js"></script>
<!-- Firebase Firestore -->
<script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-firestore.js"></script>

<!-- Your Firebase config (initializes Firebase) -->
<script src="firebase-config.js"></script>

<!-- App Logic (ALWAYS LAST) -->
<script src="app.js"></script>


</body>
</html>
